name: Bin Packing Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set matrix for test directories
        id: set-matrix
        run: |
          echo "matrix={\"testdir\":[\"edge\",\"exact\",\"hard_scale\",\"interact_rho_gap\",\"replication\",\"struct_strong_corr\",\"struct_subset_sum\",\"sweep_correlation\",\"sweep_gap\",\"sweep_nk\",\"sweep_size\",\"sweep_tightness\"]}" >> $GITHUB_OUTPUT
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++
      
      - name: Build C++ executable
        run: |
          g++ -O2 -std=c++17 binpacking.cpp -o binpacking
          chmod +x binpacking
      
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: executable
          path: binpacking
          retention-days: 1

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        testdir: [edge, exact, hard_scale, interact_rho_gap, replication, struct_strong_corr, struct_subset_sum, sweep_correlation, sweep_gap, sweep_nk, sweep_size, sweep_tightness]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download executable
        uses: actions/download-artifact@v4
        with:
          name: executable
      
      - name: Set executable permission
        run: chmod +x binpacking
      
      - name: Run benchmark for ${{ matrix.testdir }}
        id: benchmark
        run: |
          mkdir -p results
          TEST_DIR="data/generated/${{ matrix.testdir }}"
          OUTPUT_DIR="results/${{ matrix.testdir }}"
          mkdir -p "$OUTPUT_DIR"
          for instance in "$TEST_DIR"/*.txt; do
            if [ -f "$instance" ]; then
              instance_name=$(basename "$instance" .txt)
              echo "Running: $instance_name"
              ./binpacking "$instance" > "$OUTPUT_DIR/${instance_name}.out" 2>&1 || true
            fi
          done
          python3 .github/scripts/parse_results.py "$OUTPUT_DIR" "${{ matrix.testdir }}"
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.testdir }}
          path: results/${{ matrix.testdir }}
          retention-days: 7

  aggregate:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
      
      - name: Aggregate results
        run: |
          mkdir -p final-report
          python3 .github/scripts/aggregate_results.py
      
      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: final-report
          retention-days: 30
      
      - name: Print Report Summary
        if: always()
        run: |
          if [ -f "final-report/BENCHMARK_RESULTS.md" ]; then
            head -50 final-report/BENCHMARK_RESULTS.md
            echo ""
            echo "[Full report saved to final-report/BENCHMARK_RESULTS.md]"
          else
            echo "Report file not found"
          fi
